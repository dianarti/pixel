<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Disappointing Website</title>

  <link href="https://fonts.googleapis.com/css2?family=B612+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/pixeloid-sans" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #0d0d0d, #050510);
      color: white;
      font-family: 'B612 Mono', monospace;
      overflow-x: hidden;

      opacity: 0;
      animation: pageFade 0.8s ease forwards;
    }

    @keyframes pageFade {
      to { opacity: 1; }
    }

    .container {
      text-align: center;
      padding: 120px 20px;
      position: relative;
    }

    h1 {
      font-family: 'Pixeloid Sans', sans-serif;
      font-size: 42px;
      line-height: 1.4;
      color: #3b5bff;
      text-shadow: 2px 2px 0px white;
      margin-bottom: 50px;

      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.8s ease forwards;
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ✨ увеличенный текст */
    p {
      color: #aaa;
      margin-bottom: 70px;
      font-size: 18px;

      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 0.3s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ✨ более жирная кнопка */
    .btn {
      background: #d4ff00;
      color: black;
      padding: 22px 44px;
      text-decoration: none;
      display: inline-block;
      margin: 20px 0;
      transition: transform 0.2s ease;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .glitch {
      position: relative;
      display: inline-block;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
    }

    .glitch::before {
      color: red;
      transform: translate(2px, 0);
      opacity: 0.6;
    }

    .glitch::after {
      color: cyan;
      transform: translate(-2px, 0);
      opacity: 0.6;
    }

    /* ✨ декоративный текст */
    .small {
      font-size: 10px;
      color: #888;
      position: absolute;
      opacity: 0.6;
    }

    .top-right { top: 40px; right: 60px; }
    .bottom-left { bottom: 60px; left: 50px; }
    .bottom-right { bottom: 80px; right: 70px; }

    /* ✨ КРЕСТИКИ ПО СЕТКЕ */

    .cross {
      position: absolute;
      color: #d4ff00;
      font-size: 18px;
      opacity: 0.7;
    }

    /* первый блок */
    .cross-top-center {
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
    }

    .cross-left-center {
      top: 50%;
      left: 40px;
      transform: translateY(-50%);
    }

    .cross-right-center {
      top: 50%;
      right: 40px;
      transform: translateY(-50%);
    }

    /* второй блок */
    .card {
      position: relative;
      background: #1a1a2e;
      margin: 120px auto;
      width: 80%;
      max-width: 700px;
      border-radius: 10px;
      overflow: hidden;

      opacity: 0;
      transform: translateY(30px);
      animation: cardIn 1s ease forwards;
      animation-delay: 0.6s;
    }

    .cross-card-center {
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
    }

    .cross-card-left {
      top: 50%;
      left: -30px;
      transform: translateY(-50%);
    }

    .cross-card-right {
      top: 50%;
      right: -30px;
      transform: translateY(-50%);
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .window-bar {
      background: #111;
      padding: 10px;
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .red { background: #ff5f56; }
    .yellow { background: #ffbd2e; }
    .green { background: #27c93f; }

    .card-content {
      padding: 40px;
    }

    ul {
      text-align: left;
      margin-bottom: 40px;
      line-height: 1.8;
      list-style-type: disc;
      padding-left: 40px;
    }
  </style>
</head>

<body>

<div class="small top-right">[error 418]</div>
<div class="small bottom-left">[loading...]</div>
<div class="small bottom-right">[undefined]</div>

<div class="container">

  <!-- крестики 1 блока -->
  <div class="cross cross-top-center">+</div>
  <div class="cross cross-left-center">+</div>
  <div class="cross cross-right-center">+</div>

  <h1 class="glitch" data-text="THIS WEBSITE WILL PROBABLY DISAPPOINT YOU">
    THIS WEBSITE WILL PROBABLY DISAPPOINT YOU
  </h1>

  <p>Just like most products on the internet</p>

  <a href="#next" class="btn">CONTINUE ANYWAY</a>
</div>

<div id="next" class="card">

  <!-- крестики 2 блока -->
  <div class="cross cross-card-center">+</div>
  <div class="cross cross-card-left">+</div>
  <div class="cross cross-card-right">+</div>

  <div class="window-bar">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
  </div>

  <div class="card-content">
    <ul>
      <li>fast</li>
      <li>slightly better</li>
      <li>good enough</li>
    </ul>

    <a href="#" class="btn">FINE. LET’S TALK.</a>
  </div>

</div>

</body>
</html>
